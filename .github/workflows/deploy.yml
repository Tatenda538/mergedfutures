name: Deploy to GitHub Pages

on:
  push:
    branches: [steps]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: step-3-deploy/package-lock.json
      - run: npm ci
        working-directory: step-3-deploy
      - run: npm test
        working-directory: step-3-deploy

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/steps'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: step-3-deploy
      - id: deployment
        uses: actions/deploy-pages@v4
